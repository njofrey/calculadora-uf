<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://mindicador.cl; base-uri 'self';">
    <title>Calculadora UF a CLP | Rápida y Precisa</title>
    <meta name="description" content="La forma más fácil y rápida de convertir UF a Pesos Chilenos (CLP) con el valor del día. Incluye fecha y función de copiado.">
    <meta property="og:title" content="Calculadora UF a CLP">
    <meta property="og:description" content="Convierte UF a Pesos Chilenos con el valor oficial del día. Rápido y preciso.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CL">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://calculadora-uf.vercel.app/">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">
        <div class="card">
            <h1>Calculadora UF a CLP</h1>
            
            <div id="uf-display" class="uf-display-box">Cargando valor...</div>
            
            <div class="input-group">
                <label for="uf-input">Cantidad de UF</label>
                <input type="text" id="uf-input" placeholder="Ej: 1,5" inputmode="decimal" pattern="[0-9.,]*">
            </div>

            <div class="result" id="result-box" role="button" tabindex="0" aria-label="Copiar valor en pesos al portapapeles">
                <div class="result-text">
                    <h2>Total en CLP:</h2>
                    <p id="clp-result" aria-live="polite">$0</p>
                </div>
                <div class="copy-feedback" id="copy-feedback-container">
                    <div class="copy-icon" id="copy-icon-container">
                        <div id="icon-copy-wrapper"></div>
                        <div id="icon-check-wrapper"></div>
                    </div>
                    <span class="copy-text" id="copy-text"></span>
                </div>
            </div>
        </div>
        
        <p class="credit">Hecho con ❤️ por Nicolás Jofré</p>
        <p class="data-source">Datos vía mindicador.cl • Banco Central de Chile</p>
    </div>
</body>
</html>
